<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送迎スケジュール管理</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="card">
        <h1>送迎スケジュール管理</h1>
        <p class="sub">
          月ごとの予定・実績・送迎時刻・補足を見やすく管理するためのシンプルなWebアプリです。
        </p>
      </div>
      <div class="card stats" id="stats"></div>
    </section>

    <div class="layout">
      <main class="card">
        <div class="toolbar">
          <div class="left-tools">
            <input type="month" id="monthPicker" />
            <button id="generateBtn" class="primary">月を作成</button>
            <button id="todayBtn">今日へ移動</button>
          </div>
          <div class="right-tools">
            <select id="filterSelect">
              <option value="all">すべて表示</option>
              <option value="plan">予定ありのみ</option>
              <option value="pickup">送迎時刻ありのみ</option>
              <option value="done">実績ありのみ</option>
            </select>
            <button id="exportBtn">JSON書き出し</button>
            <label class="ghost" for="importInput">JSON読み込み</label>
            <input id="importInput" type="file" accept="application/json" hidden />
          </div>
        </div>

        <div class="table-shell">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>曜日</th>
                <th>予定</th>
                <th>実績</th>
                <th>送迎希望時刻</th>
                <th>補足</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
        <div class="footer">保存先: このブラウザ内（localStorage）</div>
      </main>

      <aside class="card side">
        <h3>この構成のポイント</h3>
        <div class="legend">
          <div class="legend-item"><span class="dot today"></span> 今日の行を自動で強調</div>
          <div class="legend-item"><span class="dot plan"></span> 予定ありの日が分かりやすい</div>
          <div class="legend-item"><span class="dot done"></span> 実績入力済みの日を区別</div>
        </div>

        <div class="hint">
          GitHubに置きやすいように、HTML / CSS / JS を分割しています。<br />
          必要なら次に、スマホ用UIやカレンダー表示版に拡張できます。
        </div>
      </aside>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
